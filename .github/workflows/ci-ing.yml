name: CI/CD · Ingeniería (DermaAssist)

# CI: corre los tests del backend en cada push/PR a dev-ing.
# CD: en push a dev-ing, construye la imagen Docker y la publica en GHCR.
on:
  push:
    branches: [dev-ing]
    paths:
      - "ing/**"
      - "src/**"
      - "outputs/datasets/**"
      - ".github/workflows/ci-ing.yml"
  pull_request:
    branches: [dev-ing]
    paths:
      - "ing/**"
      - "src/**"
      - ".github/workflows/ci-ing.yml"

jobs:
  test:
    name: Tests del backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ing/backend/requirements.txt

      - name: Instalar dependencias
        run: pip install -r ing/backend/requirements.txt

      - name: Pytest
        working-directory: ing/backend
        run: python -m pytest -q

  docker:
    name: Build & publish imagen (GHCR)
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          # El contexto es la raíz del repo: el backend reutiliza src/ y el dataset.
          context: .
          file: ing/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/sdomato/dermavqa-assist-api:latest
            ghcr.io/sdomato/dermavqa-assist-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

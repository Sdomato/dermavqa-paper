<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DermaAssist</title>
  <style>
    :root {
      --bg: #eef2f6;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0d9488;
      --primary-strong: #0f766e;
      --accent: #2563eb;
      --warn-bg: #fffbeb;
      --warn-border: #fde68a;
      --warn-text: #92400e;
      --danger: #dc2626;
      --radius: 14px;
      --shadow: 0 1px 3px rgba(15,23,42,.06), 0 8px 24px rgba(15,23,42,.06);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1220; --surface: #111a2b; --border: #1e293b; --text: #e2e8f0;
        --muted: #94a3b8; --warn-bg: #2a2410; --warn-border: #57430f; --warn-text: #fcd34d;
      }
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); line-height: 1.55; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

    /* Header */
    header { display: flex; align-items: center; gap: .85rem; margin-bottom: 1.25rem; }
    .logo { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--accent));
            display: grid; place-items: center; color: #fff; flex: none; box-shadow: var(--shadow); }
    header h1 { font-size: 1.5rem; margin: 0; letter-spacing: -.02em; }
    header p { margin: .1rem 0 0; color: var(--muted); font-size: .9rem; }

    /* Card */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            box-shadow: var(--shadow); padding: 1.25rem; }
    .field { margin-bottom: .9rem; }
    .field label { display: block; font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: .35rem; }
    input[type=text], textarea {
      width: 100%; padding: .7rem .85rem; font: inherit; color: var(--text); background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px; transition: border-color .15s, box-shadow .15s;
    }
    input[type=text]:focus, textarea:focus {
      outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13,148,136,.15);
    }
    textarea { resize: vertical; min-height: 96px; }

    /* File dropzone */
    .drop { display: flex; align-items: center; gap: .75rem; padding: .7rem .85rem; border: 1.5px dashed var(--border);
            border-radius: 10px; cursor: pointer; transition: border-color .15s, background .15s; }
    .drop:hover { border-color: var(--primary); background: rgba(13,148,136,.04); }
    .drop input { display: none; }
    .drop .ico { width: 32px; height: 32px; border-radius: 8px; background: rgba(13,148,136,.1); color: var(--primary);
                 display: grid; place-items: center; flex: none; }
    .drop .txt { font-size: .85rem; color: var(--muted); }
    .drop .txt b { color: var(--text); font-weight: 600; }

    /* Buttons */
    .actions { display: flex; gap: .6rem; align-items: center; margin-top: 1rem; flex-wrap: wrap; }
    button { font: inherit; font-weight: 600; cursor: pointer; border-radius: 10px; padding: .7rem 1.15rem;
             border: 1px solid transparent; transition: transform .05s, background .15s, box-shadow .15s; display: inline-flex;
             align-items: center; gap: .45rem; }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .55; cursor: default; }
    .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(13,148,136,.3); }
    .btn-primary:hover:not(:disabled) { background: var(--primary-strong); }
    .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
    .btn-secondary:hover:not(:disabled) { border-color: var(--primary); color: var(--primary-strong); }

    /* Status */
    .status { font-size: .85rem; color: var(--muted); display: inline-flex; align-items: center; gap: .45rem; }
    .status .err { color: var(--danger); }
    .spin { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--primary);
            border-radius: 50%; animation: sp .7s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }

    /* Results */
    .section-title { font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
                     color: var(--muted); margin: 1.6rem 0 .5rem; }
    .result { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
              box-shadow: var(--shadow); padding: 1.1rem; margin-bottom: .85rem; }
    .result .top { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; margin-bottom: .5rem; }
    .pill { font-size: .72rem; font-weight: 700; padding: .2rem .55rem; border-radius: 999px;
            background: rgba(13,148,136,.12); color: var(--primary-strong); }
    .tag { font-size: .72rem; color: var(--muted); }
    .qtitle { font-weight: 600; margin: .15rem 0; }
    .qcontent { color: var(--muted); font-size: .9rem; }
    .thumbs { display: flex; gap: .45rem; flex-wrap: wrap; margin: .7rem 0; }
    .thumbs img { height: 92px; width: 92px; object-fit: cover; border-radius: 10px; border: 1px solid var(--border); }
    .evidence-label { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
                      color: var(--muted); margin-top: .7rem; }
    .answer { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: .75rem;
              margin-top: .35rem; white-space: pre-wrap; font-size: .92rem; }

    /* Draft */
    .draft { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent);
             border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.15rem; margin-top: 1rem; }
    .draft .answer { background: rgba(37,99,235,.05); }

    /* Disclaimer */
    .disclaimer { display: flex; gap: .55rem; align-items: flex-start; font-size: .82rem; color: var(--warn-text);
                  background: var(--warn-bg); border: 1px solid var(--warn-border); border-radius: 10px;
                  padding: .7rem .8rem; margin: .8rem 0; }
    .disclaimer svg { flex: none; margin-top: 1px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M4.8 2.3A.3.3 0 1 0 5 2.8v3.5a4 4 0 0 0 4 4 4 4 0 0 0 4-4V2.8a.3.3 0 1 0-.2-.5"/>
          <path d="M8 15a6 6 0 0 0 12 0v-3"/><circle cx="20" cy="10" r="2"/>
        </svg>
      </div>
      <div>
        <h1>DermaAssist</h1>
        <p>Casos clínicos similares y borradores asistidos para revisión médica.</p>
      </div>
    </header>

    <div class="card">
      <div class="field">
        <label for="titulo">Motivo de consulta</label>
        <input id="titulo" type="text" placeholder="Ej: mancha rojiza que pica en el antebrazo" />
      </div>
      <div class="field">
        <label for="contenido">Descripción del caso</label>
        <textarea id="contenido" placeholder="Detalle clínico en español: evolución, síntomas, antecedentes…"></textarea>
      </div>
      <div class="field">
        <label>Imagen clínica (opcional · activa el retrieval multimodal)</label>
        <label class="drop" for="imagen">
          <span class="ico">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </span>
          <span class="txt" id="dropTxt"><b>Subir foto</b> o arrastrar aquí · JPG/PNG</span>
          <input id="imagen" type="file" accept="image/*" />
        </label>
      </div>
      <div class="actions">
        <button id="borrador" class="btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          Generar borrador
        </button>
        <button id="buscar" class="btn-secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          Buscar casos similares
        </button>
        <span id="status" class="status"></span>
      </div>
    </div>

    <div id="draft"></div>
    <div id="resultados"></div>
  </div>

  <script>
    const API = "http://localhost:8000";
    const $ = (id) => document.getElementById(id);

    function setStatus(html, loading) {
      $("status").innerHTML = (loading ? '<span class="spin"></span>' : "") + html;
    }

    $("imagen").addEventListener("change", (e) => {
      const f = e.target.files[0];
      $("dropTxt").innerHTML = f ? `<b>${escapeHtml(f.name)}</b> seleccionada` : "<b>Subir foto</b> o arrastrar aquí · JPG/PNG";
    });

    async function buscar() {
      const titulo = $("titulo").value.trim();
      const contenido = $("contenido").value.trim();
      if (!titulo && !contenido) { setStatus('<span class="err">Completá el motivo o la descripción.</span>'); return; }
      $("buscar").disabled = true;
      setStatus("Buscando…", true);
      $("resultados").innerHTML = "";

      const file = $("imagen").files[0];
      try {
        let r;
        if (file) {
          const fd = new FormData();
          fd.append("titulo", titulo); fd.append("contenido", contenido); fd.append("k", "5"); fd.append("imagenes", file);
          r = await fetch(`${API}/consulta/imagen`, { method: "POST", body: fd });
        } else {
          r = await fetch(`${API}/consulta`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ titulo, contenido, k: 5 }),
          });
        }
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        setStatus(`${data.resultados.length} casos · ${data.retriever} · ${data.tomo_ms} ms · base ${data.total_casos}`);
        render(data);
      } catch (e) {
        setStatus(`<span class="err">No se pudo conectar con la API (${API}). ¿Está levantado el backend?</span>`);
      } finally {
        $("buscar").disabled = false;
      }
    }

    function render(data) {
      const cont = $("resultados");
      if (!data.resultados || data.resultados.length === 0) { cont.innerHTML = '<p class="status">Sin resultados.</p>'; return; }
      const cards = data.resultados.map((c) => {
        const thumbs = c.imagenes_disponibles > 0
          ? `<div class="thumbs">${c.image_ids.map((id) =>
              `<img loading="lazy" src="${API}/imagen/${encodeURIComponent(id)}" onerror="this.remove()" alt="" />`).join("")}</div>`
          : "";
        return `
        <div class="result">
          <div class="top">
            <span class="pill">${(c.similitud * 100).toFixed(1)}% similar</span>
            <span class="tag">${c.encounter_id} · ${c.split}</span>
            <span class="tag">${c.imagenes_disponibles}/${c.image_ids.length} imágenes</span>
          </div>
          <div class="qtitle">${escapeHtml(c.query_title || "(sin título)")}</div>
          <div class="qcontent">${escapeHtml(c.query_content)}</div>
          ${thumbs}
          <div class="evidence-label">Respuesta del caso (evidencia)</div>
          <div class="answer">${escapeHtml(c.answer)}</div>
        </div>`;
      }).join("");
      cont.innerHTML = `
        <div class="section-title">Casos similares (${data.resultados.length})</div>
        <div class="disclaimer">${warnIcon()} Estos son casos pasados parecidos, no una recomendación clínica. Un profesional debe revisarlos antes de cualquier decisión.</div>
        ${cards}`;
    }

    // ── Borrador RAG (asíncrono: encola + poll) ──────────────────────────────
    async function generarBorrador() {
      const titulo = $("titulo").value.trim();
      const contenido = $("contenido").value.trim();
      if (!titulo && !contenido) { setStatus('<span class="err">Completá el motivo o la descripción.</span>'); return; }
      $("borrador").disabled = true;
      $("draft").innerHTML = "";
      setStatus("Encolando borrador…", true);

      try {
        const fd = new FormData();
        fd.append("titulo", titulo); fd.append("contenido", contenido);
        const file = $("imagen").files[0];
        if (file) fd.append("imagenes", file);

        const sub = await fetch(`${API}/borrador`, { method: "POST", body: fd });
        if (!sub.ok) throw new Error(`HTTP ${sub.status}`);
        const { job_id } = await sub.json();

        for (let i = 0; i < 120; i++) {
          setStatus(`Generando borrador… ${i > 0 ? `(${i})` : ""}`, true);
          const est = await (await fetch(`${API}/borrador/${job_id}`)).json();
          if (est.status === "done") { renderDraft(est); break; }
          if (est.status === "error") { setStatus(`<span class="err">Error: ${escapeHtml(est.error || "")}</span>`); break; }
          await new Promise((res) => setTimeout(res, 800));
        }
      } catch (e) {
        setStatus(`<span class="err">No se pudo conectar con la API (${API}).</span>`);
      } finally {
        $("borrador").disabled = false;
      }
    }

    function renderDraft(est) {
      const n = est.evidencia ? est.evidencia.length : 0;
      setStatus(`Borrador listo · ${n} casos de evidencia`);
      $("draft").innerHTML = `
        <div class="section-title">Borrador asistido</div>
        <div class="draft">
          <div class="evidence-label" style="color:var(--accent)">Para revisión médica</div>
          <div class="answer">${escapeHtml(est.borrador || "")}</div>
          <div class="disclaimer">${warnIcon()} Borrador preliminar generado a partir de casos similares. Debe ser revisado y aprobado por un profesional antes de cualquier uso.</div>
        </div>`;
      if (est.evidencia) render({ resultados: est.evidencia });
    }

    function warnIcon() {
      return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
    }

    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[m]));
    }

    $("buscar").addEventListener("click", buscar);
    $("borrador").addEventListener("click", generarBorrador);
    $("contenido").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) generarBorrador();
    });
  </script>
</body>
</html>

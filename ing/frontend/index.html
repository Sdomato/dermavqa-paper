<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DermaAssist</title>
  <style>
    :root {
      --cyan: #22d3ee;
      --teal: #2dd4bf;
      --violet: #a78bfa;
      --pink: #f472b6;
      --text: #e6f0ff;
      --muted: #8aa0c4;
      --glass: rgba(255,255,255,.045);
      --glass-strong: rgba(255,255,255,.07);
      --border: rgba(255,255,255,.12);
      --radius: 18px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: #05070f; color: var(--text); line-height: 1.6; position: relative; overflow-x: hidden;
    }

    /* ── Fondo: aurora + grid ────────────────────────────────────────────── */
    .bg { position: fixed; inset: 0; z-index: -2; overflow: hidden; background:
      radial-gradient(1200px 700px at 80% -10%, rgba(124,58,237,.18), transparent 60%),
      radial-gradient(900px 600px at 0% 100%, rgba(34,211,238,.16), transparent 55%),
      #05070f; }
    .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: .55; mix-blend-mode: screen; }
    .b1 { width: 520px; height: 520px; background: radial-gradient(circle, var(--cyan), transparent 70%);
          top: -120px; left: -80px; animation: drift1 22s ease-in-out infinite; }
    .b2 { width: 600px; height: 600px; background: radial-gradient(circle, var(--violet), transparent 70%);
          top: 20%; right: -180px; animation: drift2 26s ease-in-out infinite; }
    .b3 { width: 460px; height: 460px; background: radial-gradient(circle, var(--teal), transparent 70%);
          bottom: -160px; left: 30%; animation: drift3 30s ease-in-out infinite; }
    @keyframes drift1 { 50% { transform: translate(120px, 80px) scale(1.15); } }
    @keyframes drift2 { 50% { transform: translate(-100px, 120px) scale(1.1); } }
    @keyframes drift3 { 50% { transform: translate(80px, -90px) scale(1.2); } }
    .grid { position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image: linear-gradient(rgba(120,160,220,.06) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(120,160,220,.06) 1px, transparent 1px);
      background-size: 46px 46px; mask-image: radial-gradient(ellipse at 50% 30%, #000 30%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at 50% 30%, #000 30%, transparent 75%); }

    .wrap { max-width: 780px; margin: 0 auto; padding: 2.2rem 1.1rem 5rem; position: relative; }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.6rem; animation: rise .6s ease both; }
    .logo { width: 52px; height: 52px; border-radius: 15px; flex: none; display: grid; place-items: center; color: #04121a;
      background: linear-gradient(135deg, var(--cyan), var(--teal) 55%, var(--violet));
      box-shadow: 0 0 24px rgba(34,211,238,.5), inset 0 0 12px rgba(255,255,255,.35); }
    header h1 { margin: 0; font-size: 1.85rem; font-weight: 800; letter-spacing: -.02em;
      background: linear-gradient(90deg, #e6f0ff, var(--cyan), var(--violet), #e6f0ff);
      background-size: 300% 100%; -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: shimmer 8s linear infinite; }
    @keyframes shimmer { to { background-position: 300% 0; } }
    .tagline { display: flex; align-items: center; gap: .5rem; color: var(--muted); font-size: .88rem; margin-top: .15rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 10px var(--teal);
      animation: pulse 1.8s ease-in-out infinite; }
    @keyframes pulse { 50% { opacity: .35; transform: scale(.7); } }
    .chip { font-size: .68rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--cyan);
      border: 1px solid rgba(34,211,238,.4); border-radius: 999px; padding: .15rem .5rem; }

    /* ── Glass card ──────────────────────────────────────────────────────── */
    .panel { background: var(--glass); backdrop-filter: blur(22px) saturate(140%);
      -webkit-backdrop-filter: blur(22px) saturate(140%); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.4rem; box-shadow: 0 20px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);
      position: relative; animation: rise .7s ease both; }
    .panel::before { content: ""; position: absolute; inset: 0; border-radius: var(--radius); padding: 1px; pointer-events: none;
      background: linear-gradient(120deg, rgba(34,211,238,.5), transparent 30%, transparent 70%, rgba(167,139,250,.5));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; opacity: .6; }
    @keyframes rise { from { opacity: 0; transform: translateY(14px); } }

    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: .74rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      color: var(--muted); margin-bottom: .4rem; }
    input[type=text], textarea {
      width: 100%; padding: .8rem .95rem; font: inherit; color: var(--text);
      background: rgba(8,12,22,.55); border: 1px solid var(--border); border-radius: 12px;
      transition: border-color .18s, box-shadow .18s, background .18s; }
    input[type=text]::placeholder, textarea::placeholder { color: #5d709a; }
    input[type=text]:focus, textarea:focus { outline: none; border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(34,211,238,.18), 0 0 22px rgba(34,211,238,.15); background: rgba(8,12,22,.8); }
    textarea { resize: vertical; min-height: 104px; }

    /* Dropzone */
    .drop { display: flex; align-items: center; gap: .8rem; padding: .8rem .95rem; cursor: pointer;
      border: 1.5px dashed var(--border); border-radius: 12px; transition: border-color .18s, background .18s; }
    .drop:hover { border-color: var(--cyan); background: rgba(34,211,238,.06); }
    .drop input { display: none; }
    .drop .ico { width: 36px; height: 36px; border-radius: 10px; flex: none; display: grid; place-items: center;
      color: var(--cyan); background: rgba(34,211,238,.12); box-shadow: inset 0 0 12px rgba(34,211,238,.2); }
    .drop .txt { font-size: .85rem; color: var(--muted); }
    .drop .txt b { color: var(--text); font-weight: 600; }

    /* Buttons */
    .actions { display: flex; gap: .7rem; align-items: center; margin-top: 1.1rem; flex-wrap: wrap; }
    button { font: inherit; font-weight: 700; cursor: pointer; border-radius: 12px; padding: .8rem 1.3rem;
      border: 1px solid transparent; display: inline-flex; align-items: center; gap: .5rem;
      transition: transform .08s, box-shadow .2s, background .2s, border-color .2s; }
    button:active { transform: translateY(1px) scale(.99); }
    button:disabled { opacity: .5; cursor: default; }
    .btn-primary { color: #04121a; background: linear-gradient(135deg, var(--cyan), var(--teal));
      box-shadow: 0 0 22px rgba(34,211,238,.45), inset 0 1px 0 rgba(255,255,255,.4); }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 0 34px rgba(34,211,238,.75), inset 0 1px 0 rgba(255,255,255,.5); }
    .btn-ghost { color: var(--text); background: var(--glass-strong); border-color: var(--border); }
    .btn-ghost:hover:not(:disabled) { border-color: var(--violet); box-shadow: 0 0 22px rgba(167,139,250,.3); color: #fff; }

    .status { font-size: .85rem; color: var(--muted); display: inline-flex; align-items: center; gap: .5rem; }
    .status .err { color: var(--pink); }
    .spin { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,.15); border-top-color: var(--cyan);
      border-radius: 50%; animation: sp .7s linear infinite; box-shadow: 0 0 10px rgba(34,211,238,.5); }
    @keyframes sp { to { transform: rotate(360deg); } }

    /* Results */
    .section-title { font-size: .74rem; font-weight: 800; text-transform: uppercase; letter-spacing: .14em;
      color: var(--muted); margin: 2rem 0 .7rem; display: flex; align-items: center; gap: .6rem; }
    .section-title::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
    .result { background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; margin-bottom: .9rem;
      animation: rise .5s ease both; transition: border-color .2s, box-shadow .2s; }
    .result:hover { border-color: rgba(34,211,238,.35); box-shadow: 0 0 28px rgba(34,211,238,.1); }
    .top { display: flex; align-items: center; gap: .55rem; flex-wrap: wrap; margin-bottom: .55rem; }
    .pill { font-size: .72rem; font-weight: 800; padding: .22rem .6rem; border-radius: 999px; color: #04121a;
      background: linear-gradient(135deg, var(--cyan), var(--teal)); box-shadow: 0 0 14px rgba(34,211,238,.45); }
    .tag { font-size: .72rem; color: var(--muted); font-variant-numeric: tabular-nums; }
    .qtitle { font-weight: 700; margin: .1rem 0; color: #fff; }
    .qcontent { color: var(--muted); font-size: .9rem; }
    .thumbs { display: flex; gap: .5rem; flex-wrap: wrap; margin: .75rem 0; }
    .thumbs img { height: 96px; width: 96px; object-fit: cover; border-radius: 12px; border: 1px solid var(--border);
      box-shadow: 0 4px 18px rgba(0,0,0,.4); transition: transform .2s, border-color .2s; }
    .thumbs img:hover { transform: scale(1.05); border-color: var(--cyan); }
    .evidence-label { font-size: .7rem; font-weight: 800; text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); margin-top: .8rem; }
    .answer { background: rgba(8,12,22,.55); border: 1px solid var(--border); border-radius: 12px; padding: .85rem;
      margin-top: .4rem; white-space: pre-wrap; font-size: .92rem; }

    /* Draft */
    .draft { position: relative; background: var(--glass); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(167,139,250,.4); border-radius: var(--radius); padding: 1.3rem; margin-top: 1rem;
      box-shadow: 0 0 40px rgba(167,139,250,.15); animation: rise .5s ease both; }
    .draft .answer { background: rgba(167,139,250,.07); border-color: rgba(167,139,250,.25); }

    /* Disclaimer */
    .disclaimer { display: flex; gap: .6rem; align-items: flex-start; font-size: .82rem; color: #fcd9a6;
      background: rgba(251,191,36,.07); border: 1px solid rgba(251,191,36,.25); border-radius: 12px;
      padding: .75rem .85rem; margin: .85rem 0; }
    .disclaimer svg { flex: none; margin-top: 1px; color: #fbbf24; }

    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
</head>
<body>
  <div class="bg"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
  <div class="grid"></div>

  <div class="wrap">
    <header>
      <div class="logo">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M4.8 2.3A.3.3 0 1 0 5 2.8v3.5a4 4 0 0 0 4 4 4 4 0 0 0 4-4V2.8a.3.3 0 1 0-.2-.5"/>
          <path d="M8 15a6 6 0 0 0 12 0v-3"/><circle cx="20" cy="10" r="2"/></svg>
      </div>
      <div>
        <h1>DermaAssist</h1>
        <div class="tagline"><span class="dot"></span> Asistente clínico multimodal <span class="chip">AI · RAG</span></div>
      </div>
    </header>

    <div class="panel">
      <div class="field">
        <label for="titulo">Motivo de consulta</label>
        <input id="titulo" type="text" placeholder="Ej: mancha rojiza que pica en el antebrazo" />
      </div>
      <div class="field">
        <label for="contenido">Descripción del caso</label>
        <textarea id="contenido" placeholder="Detalle clínico en español: evolución, síntomas, antecedentes…"></textarea>
      </div>
      <div class="field">
        <label>Imagen clínica · activa el retrieval multimodal</label>
        <label class="drop" for="imagen">
          <span class="ico">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </span>
          <span class="txt" id="dropTxt"><b>Subir foto</b> o arrastrar aquí · JPG/PNG</span>
          <input id="imagen" type="file" accept="image/*" />
        </label>
      </div>
      <div class="actions">
        <button id="borrador" class="btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          Generar borrador
        </button>
        <button id="buscar" class="btn-ghost">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          Buscar casos
        </button>
        <span id="status" class="status"></span>
      </div>
    </div>

    <div id="draft"></div>
    <div id="resultados"></div>
  </div>

  <script>
    const API = "http://localhost:8000";
    const $ = (id) => document.getElementById(id);

    function setStatus(html, loading) {
      $("status").innerHTML = (loading ? '<span class="spin"></span>' : "") + html;
    }

    $("imagen").addEventListener("change", (e) => {
      const f = e.target.files[0];
      $("dropTxt").innerHTML = f ? `<b>${escapeHtml(f.name)}</b> seleccionada` : "<b>Subir foto</b> o arrastrar aquí · JPG/PNG";
    });

    async function buscar() {
      const titulo = $("titulo").value.trim();
      const contenido = $("contenido").value.trim();
      if (!titulo && !contenido) { setStatus('<span class="err">Completá el motivo o la descripción.</span>'); return; }
      $("buscar").disabled = true;
      setStatus("Buscando…", true);
      $("resultados").innerHTML = "";

      const file = $("imagen").files[0];
      try {
        let r;
        if (file) {
          const fd = new FormData();
          fd.append("titulo", titulo); fd.append("contenido", contenido); fd.append("k", "5"); fd.append("imagenes", file);
          r = await fetch(`${API}/consulta/imagen`, { method: "POST", body: fd });
        } else {
          r = await fetch(`${API}/consulta`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ titulo, contenido, k: 5 }),
          });
        }
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        setStatus(`${data.resultados.length} casos · ${data.retriever} · ${data.tomo_ms} ms · base ${data.total_casos}`);
        render(data);
      } catch (e) {
        setStatus(`<span class="err">No se pudo conectar con la API (${API}). ¿Está levantado el backend?</span>`);
      } finally {
        $("buscar").disabled = false;
      }
    }

    function render(data) {
      const cont = $("resultados");
      if (!data.resultados || data.resultados.length === 0) { cont.innerHTML = '<p class="status">Sin resultados.</p>'; return; }
      const cards = data.resultados.map((c) => {
        const thumbs = c.imagenes_disponibles > 0
          ? `<div class="thumbs">${c.image_ids.map((id) =>
              `<img loading="lazy" src="${API}/imagen/${encodeURIComponent(id)}" onerror="this.remove()" alt="" />`).join("")}</div>`
          : "";
        return `
        <div class="result">
          <div class="top">
            <span class="pill">${(c.similitud * 100).toFixed(1)}% similar</span>
            <span class="tag">${c.encounter_id} · ${c.split}</span>
            <span class="tag">${c.imagenes_disponibles}/${c.image_ids.length} imágenes</span>
          </div>
          <div class="qtitle">${escapeHtml(c.query_title || "(sin título)")}</div>
          <div class="qcontent">${escapeHtml(c.query_content)}</div>
          ${thumbs}
          <div class="evidence-label">Respuesta del caso (evidencia)</div>
          <div class="answer">${escapeHtml(c.answer)}</div>
        </div>`;
      }).join("");
      cont.innerHTML = `
        <div class="section-title">Casos similares (${data.resultados.length})</div>
        <div class="disclaimer">${warnIcon()} Estos son casos pasados parecidos, no una recomendación clínica. Un profesional debe revisarlos antes de cualquier decisión.</div>
        ${cards}`;
    }

    // ── Borrador RAG (asíncrono: encola + poll) ──────────────────────────────
    async function generarBorrador() {
      const titulo = $("titulo").value.trim();
      const contenido = $("contenido").value.trim();
      if (!titulo && !contenido) { setStatus('<span class="err">Completá el motivo o la descripción.</span>'); return; }
      $("borrador").disabled = true;
      $("draft").innerHTML = "";
      setStatus("Encolando borrador…", true);

      try {
        const fd = new FormData();
        fd.append("titulo", titulo); fd.append("contenido", contenido);
        const file = $("imagen").files[0];
        if (file) fd.append("imagenes", file);

        const sub = await fetch(`${API}/borrador`, { method: "POST", body: fd });
        if (!sub.ok) throw new Error(`HTTP ${sub.status}`);
        const { job_id } = await sub.json();

        for (let i = 0; i < 120; i++) {
          setStatus(`Generando borrador… ${i > 0 ? `(${i})` : ""}`, true);
          const est = await (await fetch(`${API}/borrador/${job_id}`)).json();
          if (est.status === "done") { renderDraft(est); break; }
          if (est.status === "error") { setStatus(`<span class="err">Error: ${escapeHtml(est.error || "")}</span>`); break; }
          await new Promise((res) => setTimeout(res, 800));
        }
      } catch (e) {
        setStatus(`<span class="err">No se pudo conectar con la API (${API}).</span>`);
      } finally {
        $("borrador").disabled = false;
      }
    }

    function renderDraft(est) {
      const n = est.evidencia ? est.evidencia.length : 0;
      setStatus(`Borrador listo · ${n} casos de evidencia`);
      $("draft").innerHTML = `
        <div class="section-title">Borrador asistido</div>
        <div class="draft">
          <div style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap">
            <div class="evidence-label" style="color:var(--violet);margin:0">Para revisión médica</div>
            ${safetyBadge(est.seguridad)}
          </div>
          <div class="answer">${escapeHtml(est.borrador || "")}</div>
          ${safetyDetail(est.seguridad)}
          <div class="disclaimer">${warnIcon()} Borrador preliminar generado a partir de casos similares. Debe ser revisado y aprobado por un profesional antes de cualquier uso.</div>
        </div>`;
      if (est.evidencia) render({ resultados: est.evidencia });
    }

    function safetyBadge(s) {
      if (!s) return "";
      const c = { alto: "var(--pink)", medio: "#fbbf24", bajo: "var(--teal)" }[s.nivel] || "var(--muted)";
      return `<span class="pill" style="background:${c};box-shadow:0 0 14px ${c}66;color:#04121a">Riesgo ${s.nivel}</span>`;
    }

    function safetyDetail(s) {
      if (!s) return "";
      const items = [];
      if (s.diagnosticos_no_sustentados && s.diagnosticos_no_sustentados.length)
        items.push(`<b>Diagnósticos no respaldados por la evidencia:</b> ${s.diagnosticos_no_sustentados.map(escapeHtml).join(", ")}`);
      if (s.terminos_riesgo && s.terminos_riesgo.length)
        items.push(`<b>Recomendaciones a revisar:</b> ${[...new Set(s.terminos_riesgo.map(t => t.termino))].map(escapeHtml).join(", ")}`);
      if (s.flags && s.flags.length)
        items.push(`<b>Señales:</b> ${s.flags.map(escapeHtml).join(", ")}`);
      if (!items.length) return "";
      return `<div class="disclaimer" style="color:#fca5a5;background:rgba(244,114,182,.07);border-color:rgba(244,114,182,.3)">
        ${warnIcon()}<div>${items.join("<br>")}</div></div>`;
    }

    function warnIcon() {
      return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
    }

    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[m]));
    }

    $("buscar").addEventListener("click", buscar);
    $("borrador").addEventListener("click", generarBorrador);
    $("contenido").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) generarBorrador();
    });
  </script>
</body>
</html>
